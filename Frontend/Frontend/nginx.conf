server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ───────────────────────────────────────────────────
    # Compress JS, CSS, HTML etc before sending — reduces transfer size ~70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Keep-Alive ──────────────────────────────────────────────────────────
    # Reuse TCP connections for multiple requests (faster navigation)
    keepalive_timeout 65;
    keepalive_requests 100;

    # ─── Static Asset Caching ────────────────────────────────────────────────
    # Vite hashes JS/CSS filenames — cache forever (1 year)
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images and fonts — cache for 30 days
    location ~* \.(?:webp|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── SPA Routing ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must NOT be cached — always fresh so new deploys work
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # ─── Health Check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
