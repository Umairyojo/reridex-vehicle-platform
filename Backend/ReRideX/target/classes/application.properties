spring.application.name=ReRideX

# Server Port
server.port=8080

# ──────── Tomcat Web Server Tuning (CRITICAL FOR PRODUCTION) ────────
# Prevents a small VPS from crashing under high traffic by limiting active threads.
# Requests beyond 50 are safely queued in the accept-count buffer.
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
# Drop slow/dead connections after 5 seconds to free up server resources
server.tomcat.connection-timeout=5000

# ──────── Response Compression ────────
# Compress JSON API responses before sending — reduces transfer size ~70%
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024

# ──────── Actuator ────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ──────── MySQL Database Connection ────────
spring.datasource.url=jdbc:mysql://reridexdb-prod-v4mwbd:3306/reridex-prod?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=steve
spring.datasource.password=Steve@reridex123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────── HikariCP Connection Pool Tuning ────────
# On KVM 2 (1-2 vCPUs), 5 connections is the sweet spot.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Keep connections alive so MySQL doesn't drop idle ones
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ──────── JPA / Hibernate ────────
# PRODUCTION: show-sql=true logs EVERY query to console — massive IO overhead. Disabled.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Batch fetching: instead of N+1 queries for bike images, fetch in groups of 50
spring.jpa.properties.hibernate.default_batch_fetch_size=50

